<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VaultCore POS - Sign in</title>
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               connect-src 'self' http://127.0.0.1:5175 http://localhost:5175;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data:;
               font-src 'self';">
    <style>
      :root {
        --bg: #090b10;
        --panel: #101722;
        --panel-2: #141d2b;
        --line: #243247;
        --text: #eef3fb;
        --muted: #9fb0c7;
        --accent: #25d0a7;
        --accent-2: #6fa8ff;
        --danger: #ff6b81;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
      }

      body.auth-ready {
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .card {
        width: min(380px, 100%);
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }

      .row { display: grid; gap: 9px; }
      input, button { padding: 11px 12px; border-radius: 8px; border: 1px solid var(--line); }
      input { background: #080c13; color: var(--text); }
      input::placeholder { color: #718198; }
      button { background: var(--text); color: #05070b; border-color: var(--text); cursor: pointer; font-weight: 700; }
      button.secondary { background: transparent; color: var(--text); border-color: var(--line); }
      button.link-button { padding: 0; border: 0; background: transparent; color: var(--muted); font-weight: 600; text-decoration: underline; }
      .error { color: var(--danger); font-size: 12px; min-height: 16px; }
      .hint { color: var(--muted); font-size: 12px; line-height: 1.35; }
      .auth-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 12px; }

      .loading-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: linear-gradient(180deg, rgba(16,23,34,.96), rgba(9,11,16,1));
      }

      .loading-card {
        width: min(420px, 100%);
        text-align: center;
        padding: 30px 24px 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16,23,34,.94);
        box-shadow: 0 26px 80px rgba(0,0,0,.42);
      }

      .vault-mark {
        width: 74px;
        height: 74px;
        margin: 0 auto 18px;
        border: 2px solid rgba(238,243,251,.18);
        border-top-color: var(--accent);
        border-right-color: var(--accent-2);
        border-radius: 50%;
        display: grid;
        place-items: center;
        animation: vault-spin 1.8s linear infinite;
      }

      .vault-core {
        width: 44px;
        height: 44px;
        border: 1px solid rgba(238,243,251,.28);
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        animation: vault-pulse 1.8s ease-in-out infinite;
      }

      .loading-title {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .loading-status {
        margin: 10px 0 4px;
        color: var(--text);
        font-size: 14px;
      }

      .loading-detail {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
      }

      .loading-bar {
        height: 5px;
        margin: 18px 0 18px;
        border-radius: 999px;
        background: #070a10;
        overflow: hidden;
      }

      .loading-bar span {
        display: block;
        height: 100%;
        width: 42%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        border-radius: inherit;
        animation: loading-slide 1.25s ease-in-out infinite;
      }

      .loading-actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .server-panel {
        width: min(430px, 100%);
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }

      .server-panel h2 { margin: 0 0 8px; }
      .server-panel p { margin: 0 0 14px; color: var(--muted); line-height: 1.45; }
      .server-actions { display: flex; gap: 10px; flex-wrap: wrap; }

      @keyframes vault-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes vault-pulse {
        0%, 100% { box-shadow: inset 0 0 0 0 rgba(37,208,167,.35); }
        50% { box-shadow: inset 0 0 18px 2px rgba(37,208,167,.30); }
      }

      @keyframes loading-slide {
        0% { transform: translateX(-110%); }
        50% { transform: translateX(70%); }
        100% { transform: translateX(245%); }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./login.js"></script>
  </body>
</html>
