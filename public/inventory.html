<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Inventory • RetroCatz POS</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:;
                 img-src 'self' file: data:;
                 style-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline';
                 connect-src 'self' http://127.0.0.1:5175 http://localhost:5175;">
  <style>
    body { font-family: system-ui, Arial; background:#111; color:#eee; padding:24px; }
    table { width:100%; border-collapse:collapse; margin-top:16px; }
    th, td { border:1px solid #333; padding:8px; text-align:left; }
    th { background:#1f2937; }
    tr:nth-child(even){background:#181818;}
    a.button { background:#2563eb; color:white; padding:8px 14px; text-decoration:none; border-radius:6px; }
  </style>
</head>
<body>
  <h1>Inventory</h1>
  <a href="add-item.html" class="button">+ Add New Item</a>
  <table id="inv">
    <thead>
      <tr>
        <th>SKU</th><th>Title</th><th>Platform</th><th>Condition</th><th>Variant</th><th>Qty</th><th>Cost</th><th>Price</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    (async () => {
      if (!window.api.hasSession()) return window.location.href = 'login.html';
      try { await window.api.me(); } catch { return window.location.href = 'login.html'; }

      const items = await window.api.listItems();
      const tbody = document.querySelector('#inv tbody');
      tbody.innerHTML = '';
      for (const it of items) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${it.sku}</td>
          <td>${it.title}</td>
          <td>${it.platform}</td>
          <td>${it.condition}</td>
          <td>${it.variant || ''}</td>
          <td>${it.qty}</td>
          <td>$${Number(it.cost).toFixed(2)}</td>
          <td>$${Number(it.price).toFixed(2)}</td>`;
        tbody.appendChild(tr);
      }
    })();
  </script>
</body>
</html>
