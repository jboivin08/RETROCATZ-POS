<!-- src/renderer/categories.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Categories - VaultCore POS</title>
  <link rel="stylesheet" href="index.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; img-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:5175 http://localhost:5175;" />
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #111827;
      --border: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body { margin:16px; background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; }
    .toolbar {
      display:flex;
      align-items:center;
      gap:10px;
      background:#091226;
      padding:12px;
      border-radius:8px;
      border:1px solid #0e1b36;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .toolbar h1 { margin:0; font-size:20px; font-weight:700; }
    .logo { height:22px; width:auto; display:block; }
    .toolbar-spacer { flex:1; }
    .btn {
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#0c0c0f;
      color:var(--text);
      cursor:pointer;
      transition:box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
      font-size:13px;
      white-space:nowrap;
    }
    .btn:hover {
      border-color:#596274;
      box-shadow:0 0 0 1px rgba(148,163,184,.35);
      transform:translateY(-0.5px);
    }
    .muted { color: var(--muted); font-size: 12px; }
    .panel {
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      max-width:820px;
    }
    .row { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
    input {
      flex:1;
      min-width:220px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#000;
      color:var(--text);
    }
    #cat-list { margin:0; padding-left:20px; }
    #cat-list li { padding:6px 0; border-bottom:1px solid #1f2937; }
    #cat-list li:last-child { border-bottom:none; }
    .cat-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .danger { color:#fca5a5; border-color:#7f1d1d; }
    #cat-status { min-height:18px; margin-top:10px; }
  </style>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="themes.css" />
</head>
<body>
  <header class="toolbar">
    <img class="logo" src="assets/VaultCore_Logo_White.png" alt="VaultCore" />
    <h1>Categories</h1>
    <button id="back" class="btn" type="button">Back to Dashboard</button>
    <span class="toolbar-spacer"></span>
    <span class="muted">Category management</span>
  </header>

  <main class="panel">
    <div class="row">
      <input id="cat-name" placeholder="new category name" />
      <button id="cat-add" class="btn" type="button">Add Category</button>
    </div>
    <ul id="cat-list"></ul>
    <div id="cat-status" class="muted"></div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const API_BASE = 'http://127.0.0.1:5175';
    const sessionId = localStorage.getItem('rc_session_id') || '';
    const authHeaders = sessionId ? { rc_session_id: sessionId } : {};

    $('back').onclick = () => { window.location.href = 'index.html'; };

    function setStatus(message) {
      $('cat-status').textContent = message || '';
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...authHeaders,
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }
      return data;
    }

    async function refresh() {
      const list = $('cat-list');
      list.replaceChildren();
      try {
        const data = await api('/api/categories');
        const cats = Array.isArray(data.rows) ? data.rows : [];
        if (!cats.length) {
          const li = document.createElement('li');
          li.textContent = 'No categories yet.';
          list.appendChild(li);
          return;
        }
        cats.forEach(c => {
          const li = document.createElement('li');
          const row = document.createElement('div');
          row.className = 'cat-row';
          const name = document.createElement('span');
          name.textContent = c.name || '';
          const del = document.createElement('button');
          del.className = 'btn danger';
          del.type = 'button';
          del.textContent = 'Archive';
          del.addEventListener('click', async () => {
            if (!confirm(`Archive category "${c.name}"? Existing item history will keep its category text.`)) return;
            try {
              await api(`/api/categories/${encodeURIComponent(c.id)}`, { method: 'DELETE' });
              setStatus('Category archived.');
              refresh();
            } catch (err) {
              setStatus(err.message || 'Archive failed.');
            }
          });
          row.appendChild(name);
          row.appendChild(del);
          li.appendChild(row);
          list.appendChild(li);
        });
        setStatus('');
      } catch (e) {
        console.error(e);
        setStatus('Could not load categories from the local API.');
      }
    }

    $('cat-add').onclick = async () => {
      const name = ($('cat-name').value || '').trim();
      if (!name) return;

      try {
        await api('/api/categories', {
          method: 'POST',
          body: JSON.stringify({ name })
        });
        $('cat-name').value = '';
        setStatus('Category saved.');
        refresh();
      } catch (err) {
        setStatus(err.message || 'Category save failed.');
      }
    };

    refresh();
  </script>
</body>
</html>
