<!-- src/renderer/categories.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Categories - RetroCatz POS</title>
  <link rel="stylesheet" href="index.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; img-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #111827;
      --border: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body { margin:16px; background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; }
    .toolbar {
      display:flex;
      align-items:center;
      gap:10px;
      background:#091226;
      padding:12px;
      border-radius:8px;
      border:1px solid #0e1b36;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .toolbar h1 { margin:0; font-size:20px; font-weight:700; }
    .logo { height:22px; width:auto; display:block; }
    .toolbar-spacer { flex:1; }
    .btn {
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#0c0c0f;
      color:var(--text);
      cursor:pointer;
      transition:box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
      font-size:13px;
      white-space:nowrap;
    }
    .btn:hover {
      border-color:#596274;
      box-shadow:0 0 0 1px rgba(148,163,184,.35);
      transform:translateY(-0.5px);
    }
    .muted { color: var(--muted); font-size: 12px; }
    .panel {
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      max-width:820px;
    }
    .row { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
    input {
      flex:1;
      min-width:220px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#000;
      color:var(--text);
    }
    #cat-list { margin:0; padding-left:20px; }
    #cat-list li { padding:6px 0; border-bottom:1px solid #1f2937; }
    #cat-list li:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <header class="toolbar">
    <img class="logo" src="assets/retrocatz-logo.png" alt="RetroCatz" />
    <h1>Categories</h1>
    <button id="back" class="btn" type="button">Back to Dashboard</button>
    <span class="toolbar-spacer"></span>
    <span class="muted">Category management</span>
  </header>

  <main class="panel">
    <div class="row">
      <input id="cat-name" placeholder="new category name" />
      <button id="cat-add" class="btn" type="button">Add Category</button>
    </div>
    <ul id="cat-list"></ul>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const hasRequire = typeof require === 'function';
    const ipc = hasRequire ? require('electron').ipcRenderer : null;

    $('back').onclick = () => { window.location.href = 'index.html'; };

    async function refresh() {
      const list = $('cat-list');
      list.innerHTML = '';
      try {
        let cats = [];
        if (ipc?.invoke) {
          const res = await ipc.invoke('cat:list');
          if (Array.isArray(res)) cats = res;
        } else {
          cats = JSON.parse(localStorage.getItem('cats') || '[]');
        }
        cats.forEach(c => {
          const li = document.createElement('li');
          li.textContent = c.name || c;
          list.appendChild(li);
        });
      } catch (e) {
        console.error(e);
      }
    }

    $('cat-add').onclick = async () => {
      const name = ($('cat-name').value || '').trim();
      if (!name) return;

      if (ipc?.invoke) {
        await ipc.invoke('cat:add', { name });
      } else {
        const cats = JSON.parse(localStorage.getItem('cats') || '[]');
        cats.push({ name });
        localStorage.setItem('cats', JSON.stringify(cats));
      }
      $('cat-name').value = '';
      refresh();
    };

    refresh();
  </script>
</body>
</html>
