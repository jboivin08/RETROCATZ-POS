<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Channel Sync Monitor - RetroCatz POS</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:;
                 img-src 'self' file: data: http://127.0.0.1:5175 http://localhost:5175;
                 style-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline';
                 connect-src 'self' http://127.0.0.1:5175 http://localhost:5175;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="index.css" />
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #111827;
      --border: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body { margin: 16px; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
    .shell { max-width: 1200px; margin: 0 auto; }

    .toolbar {
      display:flex;
      align-items:center;
      gap:10px;
      background:#091226;
      padding:12px;
      border-radius:8px;
      border:1px solid #0e1b36;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .toolbar h1 { margin:0; font-size:20px; font-weight:700; }
    .logo { height:22px; width:auto; display:block; }
    .toolbar-spacer { flex:1; }

    .btn {
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#0c0c0f;
      color:var(--text);
      cursor:pointer;
      transition:box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
      font-size:13px;
      white-space:nowrap;
    }
    .btn:hover{
      border-color:#596274;
      box-shadow:0 0 0 1px rgba(148,163,184,.35);
      transform:translateY(-0.5px);
    }

    .panel { background: var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .row label { font-size:12px; color: var(--muted); }
    .row select, .row input {
      background:#000;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:8px;
      padding:8px 10px;
    }
    .row button {
      background:#0c0c0f;
      border:1px solid var(--border);
      color:var(--text);
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      transition:box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
    }
    .row button:hover {
      border-color:#596274;
      box-shadow:0 0 0 1px rgba(148,163,184,.35);
      transform:translateY(-0.5px);
    }
    table { width:100%; border-collapse: collapse; font-size:12px; }
    th, td { padding:10px 8px; border-bottom:1px solid #1f2937; text-align:left; }
    th { color:#cbd5e1; font-weight:600; background:#0d0d10; }
    .ok { color:#10b981; }
    .fail { color:#ef4444; }
    .muted { color:var(--muted); font-size:12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .section-title { font-weight:600; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="toolbar">
      <img class="logo" src="assets/retrocatz-logo.png" alt="RetroCatz" />
      <h1>Channel Sync Monitor</h1>
      <button type="button" class="btn" onclick="location.href='index.html'">Back to Dashboard</button>
      <span class="toolbar-spacer"></span>
      <span class="muted">Track inventory sync health for external sales channels.</span>
    </header>

    <section class="panel">
      <div class="row">
        <label for="channel-select">Sales Channel</label>
        <select id="channel-select">
          <option value="wix">Wix</option>
        </select>
        <button type="button" id="refresh-status">Refresh Status</button>
        <button type="button" id="refresh-log">Refresh Log</button>
        <button type="button" id="link-wix">Link Wix Products by SKU</button>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">Latest Status per SKU</div>
      <div class="muted" id="status-meta">Loading...</div>
      <div style="margin-top:10px; overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>SKU</th>
              <th>Last Action</th>
              <th>OK</th>
              <th>Message</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="status-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">Recent Sync Log</div>
      <div class="muted" id="log-meta">Loading...</div>
      <div style="margin-top:10px; overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>SKU</th>
              <th>Action</th>
              <th>OK</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">Lookup SKU in Channel</div>
      <div class="row">
        <input id="lookup-sku" placeholder="Enter SKU" />
        <button type="button" id="lookup-btn">Lookup</button>
        <div class="muted" id="lookup-result"></div>
      </div>
    </section>
  </div>

  <script src="sync.js"></script>
</body>
</html>
