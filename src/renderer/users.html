<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Users - RetroCatz POS</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 connect-src 'self' http://127.0.0.1:5175 http://localhost:5175;
                 style-src 'self' 'unsafe-inline'">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #111827;
      --border: #374151;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 16px;
      background: var(--bg);
      color: var(--text);
    }
    .page-toolbar {
      display:flex;
      align-items:center;
      gap:10px;
      background:#091226;
      padding:12px;
      border-radius:8px;
      border:1px solid #0e1b36;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .page-toolbar h1 { margin:0; font-size:20px; font-weight:700; }
    .logo { height:22px; width:auto; display:block; }
    .toolbar-spacer { flex:1; }
    .btn {
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:#0c0c0f;
      color:var(--text);
      cursor:pointer;
      transition:box-shadow 0.12s ease, transform 0.12s ease, border-color 0.12s ease;
      font-size:13px;
      white-space:nowrap;
    }
    .btn:hover{
      border-color:#596274;
      box-shadow:0 0 0 1px rgba(148,163,184,.35);
      transform:translateY(-0.5px);
    }
    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr 140px 1fr auto;
      max-width: 980px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    input, select, button {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #000;
      color: var(--text);
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    th, td { border-bottom: 1px solid #1f2937; padding: 8px; text-align: center; }
    th { background:#0d0d10; color:#cbd5e1; }
    th:first-child, td:first-child { text-align: left; }
    .muted { color: var(--muted); font-size: 12px; }
    input[type="checkbox"] { transform: scale(1.1); cursor: pointer; }
    @media (max-width: 960px) { .row { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page-toolbar">
    <img class="logo" src="assets/retrocatz-logo.png" alt="RetroCatz" />
    <h1>Users</h1>
    <button id="back-btn" class="btn">Back to Dashboard</button>
    <span class="toolbar-spacer"></span>
    <span class="muted">Role and permission controls</span>
  </div>

  <section class="panel">
    <form id="user-form" class="row">
      <input name="username" placeholder="Username" required />
      <input name="display_name" placeholder="Display name (optional)" />
      <select name="role">
        <option value="clerk">clerk</option>
        <option value="manager">manager</option>
        <option value="owner">owner</option>
      </select>
      <input name="password" type="password" placeholder="Password (min 8)" required />
      <button type="submit">Add User</button>
    </form>

    <div id="debug" class="muted" style="margin-top:8px;"></div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
          <th>Active</th>
          <th>Created</th>
          <th>inv_add</th>
          <th>inv_edit</th>
          <th>inv_delete</th>
          <th>cost_change</th>
          <th>category_admin</th>
          <th>user_admin</th>
          <th>checkout</th>
          <th>reports</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-table">
        <tr><td colspan="14" class="muted">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <script src="./users.js"></script>
</body>
</html>
