appId: com.retrocats.pos
productName: Retro Catz POS
npmRebuild: false
artifactName: "RetroCatz-POS-${version}-${arch}.${ext}"
asarUnpack:
  - node_modules/better-sqlite3/**
files:
  - "**/*"
  - "!**/.env"
  - "!**/.env.*"
  - "!.npmrc"
  - "!**/*.db"
  - "!**/*.db-shm"
  - "!**/*.db-wal"
  - "!**/*.log"
  - "!backend_run.err"
  - "!backend_run.log"
  - "!dist/**"
  - "!build/**"
  - "!.git/**"
  - "!.github/**"
  - "!.npm-cache/**"
  - "!.codex-smoke-*/**"
  - "!CODEX_HANDOFF.md"
  - "!OVERNIGHT_PUNCHLIST_*.md"
  - "!UI_AUDIT_MATRIX.md"
  - "!UI_QA_REPORT.md"
  - "!RELEASE_WORKFLOW.md"
extraResources:
  - from: db
    to: db
    filter:
      - "**/*"
      - "!**/*.db"
      - "!**/*.db-shm"
      - "!**/*.db-wal"
  - from: assets
    to: assets
  - from: barcodes
    to: barcodes
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  artifactName: "RetroCatz-POS-Setup-${version}-${arch}.exe"
