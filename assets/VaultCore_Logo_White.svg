<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="700" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .white-fill { fill: #FFFFFF; }
            .white-stroke { stroke: #FFFFFF; stroke-width: 18; fill: none; }
            .text { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 6px; }
        </style>
    </defs>

    <!-- Outer Ring -->
    <circle cx="300" cy="300" r="180" class="white-stroke"/>
    
    <!-- Middle Ring -->
    <circle cx="300" cy="300" r="135" class="white-stroke"/>
    
    <!-- Inner Ring -->
    <circle cx="300" cy="300" r="90" class="white-stroke"/>
    
    <!-- Keyhole Circle -->
    <circle cx="300" cy="280" r="28" class="white-fill"/>
    
    <!-- Keyhole Stem -->
    <rect x="280" y="300" width="40" height="70" class="white-fill"/>
    
    <!-- Brand Text -->
    <text x="300" y="600" font-size="64" text-anchor="middle" class="white-fill text">
        VAULTCORE
    </text>
</svg>
